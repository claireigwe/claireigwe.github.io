<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

        <title>Test Page</title>

        <style>

        @import url('https://fonts.googleapis.com/css?family=Space+Grotesk&display=swap');

        *{
            padding: 0%;
            margin: 0%;
            overflow-x: hidden;
            }

        body{
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        header{
            box-sizing: border-box;
            width: 100vw;
            height: fit-content;
            padding: 0vw 7.5vw;
            margin: 0vw;
            background-color: #f4f4f4;
            position: fixed;
        }

        nav{
            box-sizing: border-box;
            width: 85vw;
            height: 10vh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 0vw;
        }

        #navsection{
            box-sizing: border-box;
            width: 240px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0%;
            padding: 0%;
        }

                
        #logo{
            box-sizing: border-box;
            font-family: 'Space Grotesk', 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            font-size: 24px;
            font-weight: 400;
            z-index: 50;
        }

        button{
            box-sizing: border-box;
            width: 104px;
            padding: 8px 0px;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            font-weight: 450;
        }

        .buttonstyle1{
            background-color: none;
            border: #222222 1px solid;
        }

        .buttonstyle2{
            background-color: #222222;
            color: #ffffff;
        }

        .buttonstyle3{
            box-sizing: border-box;
            height: 48px;
            justify-content: center;
            align-items: center;
            align-self: flex-end;
        }

        .buttonstyle4{
            box-sizing: border-box;
            width: 100%;
            height: 48px;
            justify-content: center;
            align-items: center;
            align-self: flex-end;
            background-color: #222222;
            color: #ffffff;
        }

        .buttonstyle5{
            box-sizing: border-box;
            width: 100%;
            height: 48px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            color: #222222;
            border: none;
        }


        .buttonstyle3 img, .buttonstyle5 img{
            box-sizing: border-box;
            width: 24px;
            aspect-ratio: 1.0;
            margin-left: 12px;

        }

        #buttongroup1{
            box-sizing: border-box;
            width: 100%;
            display: flex;
            justify-content: space-between;
            gap: 16px;
        }

        #group{
            box-sizing: border-box;
            height: fit-content;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        #signing, #navitems{
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            gap: 16px;
        }

        #navitems{
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            gap: 40px;
        }

        a{
           text-decoration: none;
           color: black;
        }

        h1{
            box-sizing: border-box;
            height: fit-content;
            font-family: 'Space Grotesk', 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            font-size: 28px;
            font-weight: 400;
            z-index: 50;
        }

        p{
            box-sizing: border-box;
            height: fit-content;
        }

        p, #navitems a {
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            font-weight: 450;

        }

        #votinginterface{
            box-sizing: border-box;
            width: 500px;
            height: 75vh;
            padding: 3.75vh 3.75%;
            margin-top: 13.75vh;
            background-color: #f4f4f4;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 12px;

        }

        #titlesection{
            box-sizing:border-box;
            height: 10vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-align: center;
            margin: 0%;
        }

        #formcontent{
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 16px;
        }

        form{
            box-sizing:border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: left;
            gap: 4px;
        }

        input{
            box-sizing: border-box;
            height: 48px;
            background-color: #f4f4f4;
            border: #222222 1px solid;
            padding-left: 5%;
            letter-spacing: 1.5px;
        }

        label{
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            font-weight: 450;
            box-sizing: border-box;
            width: fit-content;
            height: fit-content;
            padding: 0px 8px;
            background-color: #f4f4f4;
            position: relative;
            top: 16px;
            left: 8px;
        }

        footer{
            box-sizing: border-box;
            width: 100vw;
            height: 7.5vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f4;
            position: fixed;
            bottom: 0vh;
        }

        
        </style>

    </head>

    <body>
        <header>
            <nav>

                <section id="navsection">
                    <a href="#" id="logo">Poll-E</a>
                
                    <section id="navitems">
                        <a href="#">About Poll-E</a>
                        <a href="#">FAQ</a>

                    </section>
                </section>

                <section id="signing">
                    <button class="buttonstyle1">Log In</button>
                    <button class="buttonstyle2">Sign Up</button>
                </section>

            </nav>
        </header>

        <section id="votinginterface">
            
            <section id="formcontent">
                <section id="titlesection">
                    <h1>Log In</h1>
                    <p>Sign in to Poll-E to Continue</p>
                </section>

                <form>
                    <label for="option1" class="offsetlabel">Enter your Email Address</label>
                    <input id="option1" name="option1" type="email">
                    <label for="option2" class="offsetlabel">Enter your Password</label>
                    <input id="option2" name="option2" type="Password">
                </form>
            </section>

            <section id="group">
                <button class="buttonstyle4">Sign Up</button>

                <p>OR</p>

                <section id="buttongroup1">
                    <button class="buttonstyle5">Log In with Google<img src="../Images/google.png"></button>
                    <button class="buttonstyle5">Log In with Facebook<img src="../Images/facebook.png"></button>
                </section>
            </section>        
        </section>

        <footer>
            <p><strong>Poll-E</strong> was developed by <strong>Emmanuel and Samuel Akigbogun</strong></p>
        </footer>
    
    </body>

</html>
